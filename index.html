<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoundaryLine Cricket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">BoundaryLine</div>
        <ul>
            <li><a href="#">Live</a></li>
            <li><a href="#">Scores</a></li>
            <li><a href="#">News</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Live Match: India vs Australia</h1>
        <p>3rd Test - Day 2</p>
        <div class="score-card">
            <h2>IND: 350/5</h2>
            <p>AUS: 220/10</p>
            <span class="status">IND lead by 130 runs</span>
        </div>
    </header>

    <section class="news">
        <h3>Latest News</h3>
        <div class="news-grid">
            <div class="news-card">Kohli scores 50th ODI Century</div>
            <div class="news-card">IPL 2025 Auction Results</div>
            <div class="news-card">Top 10 ICC Rankings Updated</div>
        </div>
    </section>
</body>
</html>
